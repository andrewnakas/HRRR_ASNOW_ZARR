# Configuration for HRRR ASNOW Zarr Archive
dataset:
  name: "HRRR Analysis Accumulated Snowfall"
  zarr_path: "data/hrrr-analysis-snowfall.zarr"

# Date range for backfill
# NOTE: NOMADS only keeps ~2 weeks of recent data
# Historical data (2014-2021) requires NCEI/AWS archive access
time_range:
  start_date: "2026-02-20"  # Recent data available on NOMADS
  end_date: "2026-03-02"  # Updated to present

  # For historical backfill (future enhancement):
  # - 2014-2021: NCEI archive (https://www.ncei.noaa.gov/data/rapid-refresh/)
  # - 2022-present: AWS Open Data (s3://noaa-hrrr-bdp-pds/)

# NOMADS data source
nomads:
  base_url: "https://nomads.ncep.noaa.gov/cgi-bin/filter_hrrr_2d.pl"
  prod_url: "https://nomads.ncep.noaa.gov/pub/data/nccf/com/hrrr/prod"

# Rate limiting for downloads
rate_limiting:
  requests_per_minute: 10
  retry_attempts: 3
  retry_delay_seconds: 5

# Zarr encoding settings
zarr_encoding:
  compressor: "zstd"
  compression_level: 5
  shuffle: 2
  chunks:
    time: 24  # 24 hours per chunk
    y: 1059
    x: 1799

# HRRR grid specifications
grid:
  nx: 1799
  ny: 1059
  resolution_m: 3000  # 3km in meters
  projection: "+proj=lcc +lat_0=38.5 +lon_0=-97.5 +lat_1=38.5 +lat_2=38.5 +x_0=0 +y_0=0 +R=6371229 +units=m +no_defs"

# GitHub Actions settings
github_actions:
  batch_size_days: 7  # Process 7 days at a time
  max_parallel_jobs: 2  # Number of concurrent jobs

# Storage configuration
# Using local Git LFS storage (all data committed to GitHub)
cloud_storage:
  provider: "local"  # Using local storage with Git LFS
  bucket: null
  zarr_path: "hrrr-analysis-snowfall.zarr"
  region: null
