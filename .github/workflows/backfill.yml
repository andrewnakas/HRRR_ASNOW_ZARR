name: HRRR ASNOW Backfill

on:
  # Manual trigger with date range input
  workflow_dispatch:
    inputs:
      start_date:
        description: 'Start date (YYYY-MM-DD)'
        required: true
        default: '2014-10-01'
      end_date:
        description: 'End date (YYYY-MM-DD)'
        required: true
        default: '2014-10-07'
      resume:
        description: 'Resume from existing data'
        required: false
        type: boolean
        default: true

  # Scheduled run - process one week at a time
  schedule:
    # Run daily at 06:00 UTC
    - cron: '0 6 * * *'

  # Allow manual trigger without inputs for scheduled behavior
  push:
    branches:
      - main
    paths:
      - '.github/workflows/backfill.yml'
      - 'src/**'

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 hours max

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git LFS
        run: |
          git lfs install
          git lfs track "data/**/*"
          git lfs track "*.zarr/**/*"

      - name: Pull existing LFS data
        run: |
          git lfs pull

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libeccodes-dev libeccodes-tools git-lfs

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Determine date range
        id: dates
        run: |
          python3 << 'EOF'
          import os
          from datetime import datetime, timedelta
          from pathlib import Path
          import json

          # Check if manual trigger
          if "${{ github.event_name }}" == "workflow_dispatch":
              start = "${{ github.event.inputs.start_date }}"
              end = "${{ github.event.inputs.end_date }}"
          else:
              # Automatic mode: read progress file
              progress_file = Path("progress.json")

              if progress_file.exists():
                  with open(progress_file) as f:
                      progress = json.load(f)
                      last_date = datetime.strptime(progress['last_completed_date'], '%Y-%m-%d')
                      start = (last_date + timedelta(days=1)).strftime('%Y-%m-%d')
              else:
                  # First run
                  start = "2014-10-01"

              # Process 7 days at a time
              start_dt = datetime.strptime(start, '%Y-%m-%d')
              end = (start_dt + timedelta(days=6)).strftime('%Y-%m-%d')

              # Don't go beyond today
              today = datetime.now().strftime('%Y-%m-%d')
              if end > today:
                  end = today

          print(f"start_date={start}")
          print(f"end_date={end}")

          # Write to GitHub output
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"start_date={start}\n")
              f.write(f"end_date={end}\n")
          EOF

      - name: Show date range
        run: |
          echo "Processing date range:"
          echo "  Start: ${{ steps.dates.outputs.start_date }}"
          echo "  End: ${{ steps.dates.outputs.end_date }}"

      - name: Initialize or restore zarr store
        run: |
          # Check if zarr store exists in data/
          if [ ! -d "data/hrrr-analysis-snowfall.zarr" ]; then
            echo "Initializing new zarr store..."
            python src/template.py data/hrrr-analysis-snowfall.zarr config.yaml
          else
            echo "Using existing zarr store"
          fi

      - name: Run backfill
        id: backfill
        run: |
          python src/backfill.py \
            --start "${{ steps.dates.outputs.start_date }}" \
            --end "${{ steps.dates.outputs.end_date }}" \
            --zarr data/hrrr-analysis-snowfall.zarr \
            --config config.yaml \
            --tmp tmp \
            --resume \
            --save-stats backfill_stats.json

      - name: Update progress file
        if: success()
        run: |
          python3 << 'EOF'
          import json
          from datetime import datetime

          progress = {
              'last_completed_date': "${{ steps.dates.outputs.end_date }}",
              'last_run': datetime.now().isoformat(),
              'status': 'success'
          }

          with open('progress.json', 'w') as f:
              json.dump(progress, f, indent=2)
          EOF

      - name: Show statistics
        if: always()
        run: |
          if [ -f backfill_stats.json ]; then
            echo "Backfill statistics:"
            cat backfill_stats.json
          fi

      - name: Commit zarr data and progress
        if: success()
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"

          # Add .gitattributes if not already committed
          if [ ! -f .gitattributes ]; then
            git add .gitattributes
          fi

          # Stage the zarr store and progress file
          # LFS will automatically handle large files based on .gitattributes
          git add data/hrrr-analysis-snowfall.zarr/
          git add progress.json

          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            echo "Committing changes with Git LFS..."
            git commit -m "Update HRRR ASNOW data: ${{ steps.dates.outputs.start_date }} to ${{ steps.dates.outputs.end_date }}" \
              -m "Data stored using Git LFS for efficient storage." \
              -m "🤖 Generated with Claude Code"

            # Push with LFS
            git lfs push origin main
            git push origin main
          fi

      - name: Upload statistics artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backfill-stats-${{ steps.dates.outputs.start_date }}
          path: |
            backfill_stats.json
            progress.json
          retention-days: 30

      - name: Cleanup temporary files
        if: always()
        run: |
          rm -rf tmp/
          rm -f backfill_stats.json
